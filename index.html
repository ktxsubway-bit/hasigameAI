<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille Master - 점자 번역 및 무한 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .braille-dot { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #334155; transition: all 0.2s; cursor: pointer; position: relative; }
        .braille-dot.active { background-color: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .key-hint { position: absolute; font-size: 10px; color: #94a3b8; pointer-events: none; bottom: -20px; width: 100%; text-align: center; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .mode-toggle { display: flex; background: #1e293b; padding: 4px; border-radius: 12px; gap: 4px; }
        .mode-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; transition: all 0.2s; color: #94a3b8; }
        .mode-btn.active { background: #3b82f6; color: white; }

        @keyframes correct { 0% { transform: scale(1); } 50% { transform: scale(1.05); background: #065f46; } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .quiz-correct { animation: correct 0.5s ease-out; }
        .quiz-wrong { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-black text-blue-500 tracking-tighter">Braille Master</h1>
                <p class="text-slate-400 text-sm">점자 번역기 & 무한 생성 학습 퀴즈</p>
            </div>
            <div class="flex bg-slate-800 p-1.5 rounded-2xl shadow-inner">
                <button onclick="switchAppMode('translator')" id="nav-translator" class="px-8 py-2.5 rounded-xl text-sm font-bold transition-all bg-blue-600 text-white shadow-lg">번역기</button>
                <button onclick="switchAppMode('quiz')" id="nav-quiz" class="px-8 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white">퀴즈 게임</button>
            </div>
        </header>

        <main id="app-content">
            <!-- Translator Mode -->
            <div id="translator-view" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 space-y-6">
                    <div class="glass rounded-3xl p-6 shadow-xl space-y-4">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">입력 언어 모드</span>
                                <div class="mode-toggle">
                                    <button onclick="setLangMode('en')" class="mode-btn active" id="m-en">영어 (EN)</button>
                                    <button onclick="setLangMode('ko')" class="mode-btn" id="m-ko">한글 (KO)</button>
                                    <button onclick="setLangMode('num')" class="mode-btn" id="m-num">숫자/기호</button>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="copyText()" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 text-blue-400 rounded-lg border border-slate-700 transition">복사</button>
                                <button onclick="clearAll()" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 text-red-400 rounded-lg border border-slate-700 transition">지우기</button>
                            </div>
                        </div>
                        <div id="result-display" class="w-full min-h-[140px] bg-slate-950/50 rounded-2xl p-6 text-4xl font-bold break-all leading-relaxed border border-slate-800/50 shadow-inner"></div>
                    </div>

                    <div class="glass rounded-3xl p-10 flex flex-col items-center gap-10">
                        <div class="flex flex-col items-center">
                            <div class="grid grid-cols-2 gap-x-16 gap-y-8 relative">
                                <div id="dot-1" onclick="toggleDot(1)" class="braille-dot"><span class="key-hint">1</span></div>
                                <div id="dot-4" onclick="toggleDot(4)" class="braille-dot"><span class="key-hint">4</span></div>
                                <div id="dot-2" onclick="toggleDot(2)" class="braille-dot"><span class="key-hint">2</span></div>
                                <div id="dot-5" onclick="toggleDot(5)" class="braille-dot"><span class="key-hint">5</span></div>
                                <div id="dot-3" onclick="toggleDot(3)" class="braille-dot"><span class="key-hint">3</span></div>
                                <div id="dot-6" onclick="toggleDot(6)" class="braille-dot"><span class="key-hint">6</span></div>
                            </div>
                            <div id="pattern-preview" class="mt-12 h-8 text-blue-400 font-bold text-xl tracking-widest opacity-50"></div>
                        </div>
                        <div class="flex gap-4 w-full max-w-md">
                            <button onclick="addCharacter()" class="flex-[2] py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-lg shadow-blue-900/40">글자 추가</button>
                            <button onclick="addSpace()" class="flex-1 py-5 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold text-lg transition-all active:scale-95">공백</button>
                        </div>
                    </div>
                </div>

                <aside class="lg:col-span-4 h-full">
                    <div class="glass rounded-3xl p-6 h-full flex flex-col shadow-2xl">
                        <h3 class="font-bold text-white mb-6 text-sm flex items-center italic">REFERENCE GUIDE</h3>
                        <div id="guide-content" class="grid grid-cols-2 gap-3 overflow-y-auto max-h-[600px] custom-scroll pr-2"></div>
                    </div>
                </aside>
            </div>

            <!-- Quiz Mode -->
            <div id="quiz-view" class="hidden max-w-2xl mx-auto space-y-8 animate-in fade-in duration-500">
                <div class="glass rounded-3xl p-10 text-center space-y-8 shadow-2xl relative overflow-hidden" id="quiz-card">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest">
                        <span class="bg-slate-800/80 px-4 py-2 rounded-full border border-slate-700">SCORE: <span id="quiz-score" class="text-blue-400">0</span></span>
                        <div class="flex gap-2">
                            <button onclick="setQuizDifficulty('easy')" id="diff-easy" class="px-3 py-1 rounded-full border border-blue-500/50 text-blue-400 bg-blue-500/10">쉬움</button>
                            <button onclick="setQuizDifficulty('hard')" id="diff-hard" class="px-3 py-1 rounded-full border border-slate-700 text-slate-500">어려움</button>
                        </div>
                    </div>

                    <div class="py-2">
                        <p id="quiz-instruction" class="text-slate-400 text-sm mb-4 font-medium uppercase tracking-widest">다음 글자의 점자를 만드세요</p>
                        <div class="flex justify-center items-end gap-2">
                            <h2 id="quiz-question" class="text-9xl font-black text-white tracking-tighter transition-all">A</h2>
                            <span id="quiz-target-index" class="text-blue-500 font-bold mb-2 hidden">1/3</span>
                        </div>
                        <div id="quiz-word-preview" class="mt-4 flex justify-center gap-1 h-2"></div>
                    </div>
                    
                    <div class="flex justify-center py-4">
                        <div class="grid grid-cols-2 gap-x-12 gap-y-6">
                            <div id="q-dot-1" onclick="toggleDot(1)" class="braille-dot"><span class="key-hint">1</span></div>
                            <div id="q-dot-4" onclick="toggleDot(4)" class="braille-dot"><span class="key-hint">4</span></div>
                            <div id="q-dot-2" onclick="toggleDot(2)" class="braille-dot"><span class="key-hint">2</span></div>
                            <div id="q-dot-5" onclick="toggleDot(5)" class="braille-dot"><span class="key-hint">5</span></div>
                            <div id="q-dot-3" onclick="toggleDot(3)" class="braille-dot"><span class="key-hint">3</span></div>
                            <div id="q-dot-6" onclick="toggleDot(6)" class="braille-dot"><span class="key-hint">6</span></div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <button onclick="submitQuizAnswer()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-2xl transition-all shadow-lg shadow-blue-900/40 active:scale-[0.98]">입력 확인</button>
                        <div id="quiz-feedback" class="h-6 text-sm font-bold transition-all"></div>
                    </div>
                </div>
                <p class="text-center text-slate-500 text-xs">힌트: 우측 참조표 가이드를 보고 연습할 수 있습니다.</p>
            </div>
        </main>
    </div>

    <script>
        const BRAILLE_MAP = {
            en: { "A": "1", "B": "12", "C": "14", "D": "145", "E": "15", "F": "124", "G": "1245", "H": "125", "I": "24", "J": "245", "K": "13", "L": "123", "M": "134", "N": "1345", "O": "135", "P": "1234", "Q": "12345", "R": "1235", "S": "234", "T": "2345", "U": "136", "V": "1236", "W": "2456", "X": "1346", "Y": "13456", "Z": "1356" },
            ko: { "ㄱ": "4", "ㄴ": "14", "ㄷ": "24", "ㄹ": "5", "ㅁ": "15", "ㅂ": "45", "ㅅ": "6", "ㅇ": "1245", "ㅈ": "46", "ㅊ": "56", "ㅋ": "124", "ㅌ": "125", "ㅍ": "145", "ㅎ": "245", "ㅏ": "126", "ㅑ": "345", "ㅓ": "234", "ㅕ": "156", "ㅗ": "136", "ㅛ": "34", "ㅜ": "146", "ㅠ": "13", "ㅡ": "246", "ㅣ": "135", "ㅐ": "1235", "ㅔ": "1345" },
            num: { "1": "1", "2": "12", "3": "14", "4": "145", "5": "15", "6": "124", "7": "1245", "8": "125", "9": "24", "0": "245", ".": "256", ",": "2", "?": "236", "!": "235", "-": "36", "(": "2356", ")": "2356" }
        };

        let activeDots = new Set();
        let appMode = 'translator';
        let currentLangMode = 'en';
        let quizScore = 0;
        let quizDifficulty = 'easy'; // easy: 1 char, hard: word
        let currentQuiz = { question: "", answers: [], currentIndex: 0 };

        // --- Core ---
        function toggleDot(num) {
            if (activeDots.has(num)) {
                activeDots.delete(num);
                document.getElementById(`dot-${num}`)?.classList.remove('active');
                document.getElementById(`q-dot-${num}`)?.classList.remove('active');
            } else {
                activeDots.add(num);
                document.getElementById(`dot-${num}`)?.classList.add('active');
                document.getElementById(`q-dot-${num}`)?.classList.add('active');
            }
            updatePreview();
        }

        function getActivePattern() {
            return Array.from(activeDots).sort((a, b) => a - b).join('');
        }

        function updatePreview() {
            if (appMode === 'quiz') return;
            const pattern = getActivePattern();
            const previewEl = document.getElementById('pattern-preview');
            if (!pattern) { previewEl.innerText = ""; return; }
            const map = BRAILLE_MAP[currentLangMode];
            let found = Object.keys(map).find(k => map[k] === pattern);
            previewEl.innerText = found ? `입력 중: ${found}` : "패턴 분석 중...";
        }

        function setLangMode(mode) {
            currentLangMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.id === `m-${mode}`));
            resetDots();
            renderGuide();
        }

        function addCharacter() {
            const pattern = getActivePattern();
            if (!pattern) return;
            const map = BRAILLE_MAP[currentLangMode];
            let char = Object.keys(map).find(k => map[k] === pattern) || "?";
            document.getElementById('result-display').innerText += char;
            resetDots();
        }

        function addSpace() { document.getElementById('result-display').innerText += " "; }
        function resetDots() {
            activeDots.clear();
            document.querySelectorAll('.braille-dot').forEach(d => d.classList.remove('active'));
            updatePreview();
        }
        function clearAll() { document.getElementById('result-display').innerText = ""; resetDots(); }
        function copyText() {
            const text = document.getElementById('result-display').innerText;
            if(!text) return;
            navigator.clipboard.writeText(text).then(() => alert('클립보드에 복사되었습니다!'));
        }

        function renderGuide() {
            const container = document.getElementById('guide-content');
            container.innerHTML = "";
            const map = BRAILLE_MAP[currentLangMode];
            for (let char in map) {
                const item = document.createElement('div');
                item.className = "bg-slate-800/40 p-3.5 rounded-2xl flex items-center justify-between border border-slate-700/50 hover:border-blue-500/50 transition cursor-pointer group active:scale-95 shadow-sm";
                item.onclick = () => {
                    resetDots();
                    map[char].split('').forEach(d => toggleDot(parseInt(d)));
                };
                item.innerHTML = `<span class="font-bold text-white text-lg">${char}</span><span class="text-[11px] text-blue-400 mono font-bold bg-slate-900/80 px-2 py-1 rounded-md group-hover:text-blue-300">${map[char]}</span>`;
                container.appendChild(item);
            }
        }

        function switchAppMode(mode) {
            appMode = mode;
            document.getElementById('translator-view').classList.toggle('hidden', mode !== 'translator');
            document.getElementById('quiz-view').classList.toggle('hidden', mode !== 'quiz');
            document.getElementById('nav-translator').className = mode === 'translator' ? "px-8 py-2.5 rounded-xl text-sm font-bold transition-all bg-blue-600 text-white shadow-lg" : "px-8 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white";
            document.getElementById('nav-quiz').className = mode === 'quiz' ? "px-8 py-2.5 rounded-xl text-sm font-bold transition-all bg-blue-600 text-white shadow-lg" : "px-8 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white";
            if (mode === 'quiz') startNewQuiz(); else renderGuide();
            resetDots();
        }

        // --- Infinite Quiz Engine ---
        function setQuizDifficulty(diff) {
            quizDifficulty = diff;
            document.getElementById('diff-easy').className = diff === 'easy' ? "px-3 py-1 rounded-full border border-blue-500/50 text-blue-400 bg-blue-500/10" : "px-3 py-1 rounded-full border border-slate-700 text-slate-500";
            document.getElementById('diff-hard').className = diff === 'hard' ? "px-3 py-1 rounded-full border border-blue-500/50 text-blue-400 bg-blue-500/10" : "px-3 py-1 rounded-full border border-slate-700 text-slate-500";
            startNewQuiz();
        }

        function startNewQuiz() {
            const allLangs = ['en', 'ko', 'num'];
            currentQuiz.answers = [];
            currentQuiz.currentIndex = 0;

            if (quizDifficulty === 'easy') {
                const lang = allLangs[Math.floor(Math.random() * 3)];
                const keys = Object.keys(BRAILLE_MAP[lang]);
                const char = keys[Math.floor(Math.random() * keys.length)];
                currentQuiz.question = char;
                currentQuiz.answers.push(BRAILLE_MAP[lang][char]);
                document.getElementById('quiz-target-index').classList.add('hidden');
            } else {
                // Hard: Random word (2-3 chars)
                const lang = allLangs[Math.floor(Math.random() * 2)]; // en or ko
                const keys = Object.keys(BRAILLE_MAP[lang]);
                let word = "";
                for(let i=0; i<3; i++) {
                    const char = keys[Math.floor(Math.random() * keys.length)];
                    word += char;
                    currentQuiz.answers.push(BRAILLE_MAP[lang][char]);
                }
                currentQuiz.question = word;
                document.getElementById('quiz-target-index').classList.remove('hidden');
                updateQuizTargetUI();
            }

            document.getElementById('quiz-question').innerText = currentQuiz.question[0];
            document.getElementById('quiz-feedback').innerText = "";
            document.getElementById('quiz-feedback').className = "h-6 text-sm font-bold text-slate-500";
            document.getElementById('quiz-instruction').innerText = quizDifficulty === 'easy' ? "다음 글자의 점자를 만드세요" : `단어 학습: "${currentQuiz.question}"`;
            resetDots();
        }

        function updateQuizTargetUI() {
            document.getElementById('quiz-target-index').innerText = `${currentQuiz.currentIndex + 1}/${currentQuiz.answers.length}`;
            document.getElementById('quiz-question').innerText = currentQuiz.question[currentQuiz.currentIndex];
        }

        function submitQuizAnswer() {
            const userPattern = getActivePattern();
            const correctPattern = currentQuiz.answers[currentQuiz.currentIndex];
            const feedback = document.getElementById('quiz-feedback');
            const card = document.getElementById('quiz-card');

            if (userPattern === correctPattern) {
                if (quizDifficulty === 'hard' && currentQuiz.currentIndex < currentQuiz.answers.length - 1) {
                    currentQuiz.currentIndex++;
                    updateQuizTargetUI();
                    feedback.innerText = "좋아요! 다음 글자...";
                    feedback.className = "h-6 text-sm font-bold text-blue-400";
                    resetDots();
                } else {
                    quizScore += (quizDifficulty === 'easy' ? 10 : 50);
                    document.getElementById('quiz-score').innerText = quizScore;
                    feedback.innerText = "참 잘했습니다! 정답입니다.";
                    feedback.className = "h-6 text-sm font-bold text-green-400";
                    card.classList.add('quiz-correct');
                    setTimeout(() => {
                        card.classList.remove('quiz-correct');
                        startNewQuiz();
                    }, 600);
                }
            } else {
                feedback.innerText = "패턴이 틀렸습니다. 다시 시도해보세요!";
                feedback.className = "h-6 text-sm font-bold text-red-400";
                card.classList.add('quiz-wrong');
                setTimeout(() => card.classList.remove('quiz-wrong'), 300);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '6') toggleDot(parseInt(e.key));
            else if (e.key === 'Enter') appMode === 'translator' ? addCharacter() : submitQuizAnswer();
            else if (e.key === ' ' && appMode === 'translator') addSpace();
            else if (e.key === 'Backspace' && appMode === 'translator') {
                const d = document.getElementById('result-display');
                d.innerText = d.innerText.slice(0, -1);
            }
        });

        window.onload = () => renderGuide();
    </script>
</body>
</html>
