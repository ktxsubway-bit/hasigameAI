<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 스텔스 전투기 - 공중전</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-panel {
            background: rgba(0, 50, 0, 0.2); border-left: 4px solid #0f0;
            padding: 15px 25px; color: #0f0; font-family: 'Courier New', Courier, monospace; font-size: 20px;
            text-shadow: 0 0 8px #0f0; width: 280px;
        }

        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid rgba(0,255,0,0.3); padding-bottom: 5px; }
        .stat-val { font-weight: bold; font-size: 24px; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            z-index: 1000; flex-direction: column; color: #0f0;
        }

        /* iframe 환경 대응을 위한 클래스 */
        #overlay.hidden {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .menu-box {
            border: 2px solid #0f0; padding: 40px 60px; text-align: center;
            background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 30px #0f0;
        }

        .btn {
            margin-top: 30px; padding: 15px 40px; background: #0f0; color: #000;
            font-weight: bold; font-size: 20px; cursor: pointer; border: none;
            transition: all 0.3s;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        #throttle-container {
            position: absolute; left: 30px; bottom: 30px; width: 40px; height: 200px;
            border: 2px solid #0f0; background: rgba(0,50,0,0.3);
        }
        #throttle-bar {
            position: absolute; bottom: 0; width: 100%; height: 50%; background: #0f0;
            transition: height 0.1s; box-shadow: 0 0 15px #0f0;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="menu-box">
            <h1>STEALTH FIGHTER</h1>
            <p>전투기 제어 시스템 준비 완료</p>
            <p style="font-size: 14px; color: #888; margin-top: 10px;">WASD: 기체 제어 | SHIFT/CTRL: 속도 조절 | SPACE: 미사일 발사</p>
            <button class="btn" onclick="startGame()">SORTIE (출격)</button>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud-panel">
            <div class="stat-line"><span>SCORE</span><span id="val-score" class="stat-val">0</span></div>
            <div class="stat-line"><span>SPEED</span><span id="val-spd" class="stat-val">0 KM/H</span></div>
            <div class="stat-line"><span>ALTITUDE</span><span id="val-alt" class="stat-val">0 FT</span></div>
        </div>
        
        <div style="display: flex; justify-content: flex-end;">
            <div class="hud-panel" style="width: 150px; border-left: none; border-right: 4px solid #0f0; text-align: right;">
                <div class="stat-line"><span>THR</span><span id="val-thr" class="stat-val">50%</span></div>
            </div>
        </div>
    </div>

    <div id="throttle-container">
        <div id="throttle-bar"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 전역 변수 설정
        let scene, camera, renderer, clock;
        let jetGroup, terrain, sea;
        let isGameRunning = false;

        // 게임 상태 변수
        let speed = 200, throttle = 50, score = 0;
        const maxSpeed = 800, minFlightSpeed = 150;
        let pitch = 0, roll = 0, yaw = 0;
        
        const keys = {};
        const missiles = [];
        const enemies = [];

        init();
        renderLoop();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000510);
            scene.fog = new THREE.FogExp2(0x000510, 0.0008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // 조명
            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            // 기체 생성
            createJetFighter();
            
            // 환경 생성 (바다 및 지형)
            createEnvironment();

            // 이벤트 리스너
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onResize);
        }

        function createJetFighter() {
            jetGroup = new THREE.Group();
            
            // 동체
            const bodyGeo = new THREE.ConeGeometry(1, 6, 4);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 100 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2;
            jetGroup.add(body);

            // 주익 (날개)
            const wingGeo = new THREE.BoxGeometry(5, 0.1, 2);
            const wing = new THREE.Mesh(wingGeo, bodyMat);
            wing.position.z = -0.5;
            jetGroup.add(wing);

            jetGroup.position.y = 500;
            scene.add(jetGroup);
            
            // 카메라는 기체 뒤쪽에 고정
            jetGroup.add(camera);
            camera.position.set(0, 2, 8);
            camera.lookAt(0, 0, -10);
        }

        function createEnvironment() {
            // 바다
            const seaGeo = new THREE.PlaneGeometry(20000, 20000);
            const seaMat = new THREE.MeshPhongMaterial({ color: 0x001133, transparent: true, opacity: 0.8 });
            sea = new THREE.Mesh(seaGeo, seaMat);
            sea.rotation.x = -Math.PI / 2;
            scene.add(sea);

            // 간단한 지형 조각들
            for(let i=0; i<40; i++) {
                const islandGeo = new THREE.ConeGeometry(50 + Math.random()*100, 100 + Math.random()*200, 6);
                const islandMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
                const island = new THREE.Mesh(islandGeo, islandMat);
                island.position.set(Math.random()*10000-5000, 0, Math.random()*10000-5000);
                scene.add(island);
            }
        }

        function startGame() {
            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.classList.add('hidden'); // 클래스로 숨기기
            }
            isGameRunning = true;
            window.focus(); // iframe 포커스 획득
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            if (isGameRunning) {
                updatePhysics(dt, time);
                updateUI();
                
                // 카메라 효과
                camera.rotation.z = -roll * 0.2;
                camera.fov = 75 + (speed / maxSpeed) * 20;
                camera.updateProjectionMatrix();

                // 적기 생성 로직 (예시)
                if (Math.random() < 0.005 && enemies.length < 3) spawnEnemy();
            }

            renderer.render(scene, camera);
        }

        function updatePhysics(dt, time) {
            // 속도 제어 (Shift/Ctrl)
            if (keys['ShiftLeft']) throttle = Math.min(100, throttle + 0.5);
            if (keys['ControlLeft']) throttle = Math.max(0, throttle - 0.5);

            const targetSpeed = (throttle / 100) * maxSpeed;
            speed += (targetSpeed - speed) * dt;

            // 회전 제어 (WASD)
            const rotationSpeed = 1.5 * dt;
            if (keys['KeyW']) pitch += rotationSpeed;
            if (keys['KeyS']) pitch -= rotationSpeed;
            if (keys['KeyA']) roll += rotationSpeed;
            if (keys['KeyD']) roll -= rotationSpeed;

            // 자동 수평 복원 및 마찰
            pitch *= 0.98;
            roll *= 0.98;

            // 기체 이동 적용
            jetGroup.translateZ(-speed * dt * 0.1);
            jetGroup.rotation.x = pitch;
            jetGroup.rotation.z = roll;

            // 지면 충돌 검사
            if (jetGroup.position.y < 5) gameOver();
        }

        function updateUI() {
            document.getElementById('val-score').innerText = score;
            document.getElementById('val-spd').innerText = Math.floor(speed) + " KM/H";
            document.getElementById('val-alt').innerText = Math.floor(jetGroup.position.y * 5) + " FT";
            document.getElementById('val-thr').innerText = Math.floor(throttle) + " %";
            document.getElementById('throttle-bar').style.height = throttle + "%";

            if(speed < minFlightSpeed + 50) document.getElementById('val-spd').style.color = '#ff0000';
            else document.getElementById('val-spd').style.color = '#00ff00';
        }

        function spawnEnemy() {
            // 적기 생성 로직 생략 (기능 확장 시 추가 가능)
        }

        function gameOver() {
            isGameRunning = false;
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            document.querySelector('.menu-box h1').innerText = "SYSTEM FAILED";
            document.querySelector('.menu-box h1').style.color = "#ff0000";
            document.querySelector('.menu-box p').innerText = `기체가 파괴되었습니다. (최종 점수: ${score})`;
            document.querySelector('.btn').innerText = "재시작 (REBOOT)";
            document.querySelector('.btn').onclick = () => location.reload();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
